<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <title>Sherlock X Grist X Opentheso</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div id="content">
            <div style="display: flex; flex-direction: row; gap: 24px; width: 100%; height: 100%;">
                <!-- Colonne gauche : Record  et indexations existantes -->
                <div id="existingIndexationsCol"
                    style="flex: 1; overflow-y: auto; border-right: 1px solid #e0e0e0; padding-right: 20px;">
                    <span style="font-weight:bold;">Ligne sélectionnée: </span>
                    <span id="selectedRecordLabel"></span>
                    <span id="generateLabelsButton">🏷️</span>
                    <!-- La liste des indexations existantes sera injectée ici -->
                    <div id="existingIndexationsList" class="indexation-list"></div>
                </div>
                <!-- Colonne droite : Thésaurus et résultats de recherche -->
                <div id="thesaurusCol" style="flex: 0.7; overflow-y: auto;">
                    <span style="font-weight:bold;">Thésaurus sélectionné :</span>
                    <span id="selectedThesaurusLabel"></span>
                    <div id="searchResults" style="margin-top: 16px;"></div>
                </div>
            </div>
        </div>
        <div id="configWarningDiv" style="display:none;">
            <h5 style="font-weight:bold;">⚠️ Problème de configuration du plugin. Veuillez créer les colonnes suivantes</h5>
            <ul id="configWarningList">
            </ul>
        </div>
    </main>
</body>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script type="module" src="./index.ts"></script>

</html>
